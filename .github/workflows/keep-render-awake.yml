name: Keep Render API Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      API_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL || 'https://greencrop-api.onrender.com/api/health' }}
    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 --retry 3 --retry-delay 10 "$API_HEALTH_URL"
