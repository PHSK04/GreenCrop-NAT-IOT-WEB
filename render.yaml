services:
  - type: web
    name: greencropnat-api
    env: node
    plan: free
    region: singapore
    autoDeploy: true
    buildCommand: npm ci --legacy-peer-deps
    startCommand: node server/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: ENABLE_DEV_TOKEN
        value: "false"
      # Set these values in Render dashboard before first production run:
      # DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME, JWT_SECRET, CORS_ORIGINS
